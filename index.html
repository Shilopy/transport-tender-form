<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на перевозку — ответ перевозчика</title>
    <style>
        :root {
            --primary: #2C3E50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
            --text-muted: #7f8c8d;
            --border: #dcdde1;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 16px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 16px;
        }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 4px; }
        h2 { color: var(--primary); font-size: 1.1rem; margin: 16px 0 8px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
        }
        .badge-new { background: #e8f4fd; color: var(--accent); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
        .detail-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .detail-value { font-size: 0.95rem; }
        .full-width { grid-column: 1 / -1; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { padding: 8px 10px; text-align: left; border: 1px solid var(--border); font-size: 0.9rem; }
        th { background: var(--primary); color: #fff; font-weight: 600; }
        tr:nth-child(even) { background: #f9fafb; }
        .cost-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; }
        .cost-input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.9rem; font-family: inherit;
        }
        .input-group textarea { resize: vertical; min-height: 60px; }
        .btn {
            display: inline-block; padding: 10px 24px; border: none; border-radius: var(--radius);
            cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: background 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-primary:disabled { background: #b0c4de; cursor: not-allowed; }
        .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 12px; font-size: 0.9rem; }
        .alert-info { background: #e8f4fd; color: #1a5276; border: 1px solid #b6d4fe; }
        .alert-error { background: #fdecea; color: #922b21; border: 1px solid #f5c6cb; }
        .alert-success { background: #e8f8f0; color: #1e8449; border: 1px solid #c3e6cb; }
        .loader { text-align: center; padding: 40px; color: var(--text-muted); }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- ID заявки из URL / заглушка -->
        <div id="bid-id-display" style="text-align:center;padding:8px;font-size:0.85rem;color:var(--text-muted);"></div>

        <!-- Состояния: loading, error, form, success -->
        <div id="loading" class="loader">
            <div class="spinner"></div>
            <p style="margin-top:12px;">Загрузка данных заявки...</p>
        </div>

        <div id="error-state" style="display:none;">
            <div class="alert alert-error" id="error-msg"></div>
            <button class="btn btn-primary" onclick="loadBid()">🔄 Повторить</button>
        </div>

        <div id="form-state" style="display:none;">
            <!-- Детали заявки -->
            <div class="card">
                <h1 id="bid-title">Заявка</h1>
                <span class="badge badge-new" id="bid-status"></span>
                <span style="margin-left:8px;font-size:0.8rem;color:var(--text-muted);" id="bid-date"></span>
            </div>

            <div class="card">
                <h2>📌 Основные данные</h2>
                <div class="detail-grid" id="bid-main-details"></div>
            </div>

            <div class="card" id="cargo-card" style="display:none;">
                <h2>📦 Информация о грузе</h2>
                <div id="cargo-details"></div>
            </div>

            <!-- Форма предложения -->
            <div class="card">
                <h2>📝 Данные перевозчика</h2>
                <div class="input-group">
                    <label for="carrier-name">Название компании / ФИО *</label>
                    <input type="text" id="carrier-name" placeholder="ООО «Перевозчик»" required>
                </div>
                <div class="input-group">
                    <label for="carrier-email">Email для связи *</label>
                    <input type="email" id="carrier-email" placeholder="info@company.ru" required>
                </div>
            </div>

            <div class="card">
                <h2>💰 Расчёт стоимости</h2>
                <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px;">
                    Укажите стоимость по позициям. Поля с нулевым значением игнорируются.
                </p>
                <table>
                    <thead>
                        <tr><th>Статья затрат</th><th>Сумма</th><th>Валюта</th></tr>
                    </thead>
                    <tbody id="cost-table-body"></tbody>
                </table>
            </div>

            <div class="card">
                <div class="input-group">
                    <label for="comments">Комментарий</label>
                    <textarea id="comments" placeholder="Дополнительная информация, условия..."></textarea>
                </div>
                <button class="btn btn-primary" id="submit-btn" onclick="submitOffer()">📤 Отправить предложение</button>
                <span id="submit-error" style="display:none;color:var(--danger);font-size:0.85rem;margin-left:12px;"></span>
            </div>
        </div>

        <div id="success-state" style="display:none;">
            <div class="alert alert-success" id="success-msg"></div>
        </div>

        <div class="footer">Transport Tender System © 2025</div>
    </div>

    <script>
        // --- Конфигурация ---
        // Базовый URL API сервера. Для GitHub Pages замените на IP вашего сервера.
        const API_BASE = 'http://10.21.158.3:8000';

        // Статьи затрат — фиксированный список
        const COST_ITEMS = [
            { item: 'Pre-carriage', currency: 'USD' },
            { item: 'OTHC', currency: 'USD' },
            { item: 'Sea freight', currency: 'USD' },
            { item: 'ЖД перевозка', currency: 'RUB' },
            { item: 'Прямое ЖД', currency: 'USD' },
            { item: 'Станционные затраты', currency: 'RUB' },
            { item: 'Доставка со станции', currency: 'RUB' },
        ];

        let currentBid = null;

        // --- Утилиты ---
        function show(elId) { document.getElementById(elId).style.display = ''; }
        function hide(elId) { document.getElementById(elId).style.display = 'none'; }

        function getBidIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('bid') || params.get('bid_id') || params.get('id') || '';
        }

        function formatDate(isoStr) {
            if (!isoStr) return '—';
            try {
                const d = new Date(isoStr);
                return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch { return isoStr.slice(0, 10); }
        }

        function escapeHtml(str) {
            if (!str) return '—';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // --- Загрузка заявки ---
        async function loadBid() {
            const bidId = getBidIdFromUrl();
            document.getElementById('bid-id-display').textContent = bidId ? `ID заявки: ${bidId}` : '';

            if (!bidId) {
                showError('Не указан ID заявки в URL. Добавьте ?bid=SHIP-... к адресу страницы.');
                return;
            }

            hide('error-state');
            hide('form-state');
            hide('success-state');
            show('loading');

            try {
                const resp = await fetch(`${API_BASE}/api/bid/${encodeURIComponent(bidId)}`);
                if (!resp.ok) {
                    if (resp.status === 404) {
                        showError('Заявка с таким ID не найдена. Проверьте правильность ссылки.');
                    } else {
                        const body = await resp.text();
                        showError(`Ошибка сервера (${resp.status}): ${body}`);
                    }
                    return;
                }
                currentBid = await resp.json();
                renderForm(currentBid);
            } catch (err) {
                showError(`Не удалось подключиться к серверу. Проверьте доступность: ${err.message}`);
            }
        }

        function showError(msg) {
            hide('loading');
            hide('form-state');
            hide('success-state');
            show('error-state');
            document.getElementById('error-msg').textContent = msg;
        }

        function renderForm(bid) {
            hide('loading');
            hide('error-state');
            hide('success-state');
            show('form-state');

            document.getElementById('bid-title').textContent = `Заявка на перевозку ${bid.id}`;
            document.getElementById('bid-status').textContent = bid.status || 'Новая';
            document.getElementById('bid-date').textContent = `Создана: ${formatDate(bid.date_created)}`;

            // Основные данные
            const d = bid.details || {};
            const mainGrid = document.getElementById('bid-main-details');
            const fields = [
                ['Номер заказа', bid.order_number || '—'],
                ['Страна отправки', d.country_from || '—'],
                ['Порт отправки', d.port_from || '—'],
                ['Incoterm', d.incoterm || '—'],
                ['Готовность груза', d.ready_date || '—'],
                ['Тип контейнера', d.container_type || '—'],
                ['Тип груза', d.cargo_type || '—'],
                ['Способ доставки', d.delivery_method || '—'],
                ['Код ТНВЭД', d.hs_code || '—'],
                ['Адрес погрузки', d.loading_address || '—'],
                ['Условия оплаты', d.payment_terms || '—'],
                ['Примечания', d.notes || '—'],
                ['Описание груза', d.cargo_description || '—'],
            ];
            mainGrid.innerHTML = fields
                .filter(([, v]) => v && v !== '—')
                .map(([label, value]) => {
                    const isLong = label === 'Адрес погрузки' || label === 'Примечания' || label === 'Описание груза';
                    const colClass = isLong ? 'full-width' : '';
                    return `<div class="${colClass}"><span class="detail-label">${label}</span><br><span class="detail-value">${escapeHtml(value)}</span></div>`;
                })
                .join('');

            // Таблица стоимости
            const tbody = document.getElementById('cost-table-body');
            tbody.innerHTML = COST_ITEMS.map((ci, idx) => `
                <tr>
                    <td>${ci.item}</td>
                    <td><input type="number" class="cost-input" id="cost-${idx}" step="0.01" min="0" placeholder="0.00"></td>
                    <td><span style="font-weight:600;">${ci.currency}</span></td>
                </tr>
            `).join('');

            // Сброс ошибки отправки
            document.getElementById('submit-error').style.display = 'none';
        }

        // --- Отправка предложения ---
        async function submitOffer() {
            const carrierName = document.getElementById('carrier-name').value.trim();
            const carrierEmail = document.getElementById('carrier-email').value.trim();
            const comments = document.getElementById('comments').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            const submitError = document.getElementById('submit-error');

            submitError.style.display = 'none';

            // Валидация
            if (!carrierName) {
                submitError.textContent = 'Укажите название компании';
                submitError.style.display = '';
                return;
            }
            if (!carrierEmail || !carrierEmail.includes('@')) {
                submitError.textContent = 'Укажите корректный email';
                submitError.style.display = '';
                return;
            }

            // Сбор стоимости
            const costs = [];
            COST_ITEMS.forEach((ci, idx) => {
                const input = document.getElementById(`cost-${idx}`);
                const val = parseFloat(input.value);
                if (!isNaN(val) && val > 0) {
                    costs.push({ ITEM: ci.item, COST: Math.round(val * 100) / 100, CURRENCY: ci.currency });
                }
            });

            if (costs.length === 0) {
                submitError.textContent = 'Укажите хотя бы одну позицию стоимости';
                submitError.style.display = '';
                return;
            }

            const payload = {
                bid_id: currentBid.id,
                carrier: carrierName,
                sender_email: carrierEmail,
                costs: costs,
                comments: comments,
            };

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';

            try {
                const resp = await fetch(`${API_BASE}/api/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!resp.ok) {
                    const body = await resp.json().catch(() => ({}));
                    const msg = body.detail || `Ошибка сервера (${resp.status})`;
                    if (resp.status === 409) {
                        submitError.textContent = msg;
                    } else {
                        submitError.textContent = msg;
                    }
                    submitError.style.display = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '📤 Отправить предложение';
                    return;
                }

                const result = await resp.json();
                hide('form-state');
                show('success-state');
                document.getElementById('success-msg').innerHTML = `
                    <strong>✅ Предложение успешно отправлено!</strong><br>
                    Номер предложения: #${result.offer_id}<br>
                    Спасибо, ${escapeHtml(carrierName)}. Мы свяжемся с вами при необходимости.
                `;
            } catch (err) {
                submitError.textContent = `Ошибка соединения: ${err.message}`;
                submitError.style.display = '';
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить предложение';
            }
        }

        // --- Старт ---
        loadBid();
    </script>
</body>
</html>
